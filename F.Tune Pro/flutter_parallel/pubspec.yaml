name: ftune_flutter
description: Parallel Flutter prototype for F.Tune Pro without removing Electron.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  desktop_multi_window: ^0.3.0
  desktop_drop: ^0.7.0
  cryptography: ^2.7.0
  file_selector: ^1.0.3
  google_fonts: ^6.2.1
  http: ^1.6.0
  package_info_plus: ^8.0.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  video_player: ^2.9.3
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/FH5_cars.json
    - assets/data/FH6_cars.json
    - assets/data/car_color_map.json
    - assets/data/wiki_car_thumbnails.json
    - assets/images/fh5-hero.jpeg
    - assets/images/fh6-hero.jpg
    - assets/images/fh6-main-bg.jpg
    - assets/images/fvgc-logo.png
    - assets/images/donate-qr.jpg
    - assets/images/welcome/

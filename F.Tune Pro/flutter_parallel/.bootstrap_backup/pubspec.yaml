name: ftune_flutter
description: Parallel Flutter prototype for F.Tune Pro without removing Electron.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/FH5_cars.json
    - assets/images/fh6-main-bg.jpg
    - assets/images/fvgc-logo.png
